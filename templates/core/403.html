{% extends 'base.html' %}
{% block title %}403 — Нет доступа{% endblock %}
{% block page_title %}Доступ запрещён{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card text-center p-4" style="border-left:4px solid #dc3545">
      <div class="card-body">
        <div class="fs-1 fw-bold text-danger">403</div>
        <h4 class="fw-bold mt-2">Доступ запрещён</h4>
        <p class="text-muted">{{ exception|default:"У вас нет прав для просмотра этой страницы." }}</p>
        <a href="{% url 'core:portal' %}" class="btn btn-outline-primary mt-2">
          <i class="bi bi-house me-1"></i> На главную
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
