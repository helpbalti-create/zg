{% extends 'base.html' %}
{% block title %}403 — Нет доступа{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card text-center p-4" style="border-top: 4px solid #dc3545;">
      <div class="card-body">
        <div class="fs-1 fw-bold text-danger mb-2">403</div>
        <h4 class="fw-bold">Доступ запрещён</h4>
        <p class="text-muted mt-2 mb-4">
          {{ exception|default:"У вас нет прав для просмотра этой страницы." }}<br>
          <span class="small">Обратитесь к администратору для получения доступа.</span>
        </p>
        <a href="/" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i> Назад
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
