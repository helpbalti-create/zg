{% extends 'base.html' %}
{% block title %}Нет доступных разделов — Здоровый Город{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card text-center p-4">
      <div class="card-body">
        <div class="fs-1 mb-3">🔒</div>
        <h5 class="fw-bold">Разделы не назначены</h5>
        <p class="text-muted mt-2 mb-4">
          Ваш аккаунт подтверждён, но администратор ещё не назначил вам доступ к приложениям.<br>
          <span class="small">Обратитесь к администратору.</span>
        </p>
        <form method="post" action="{% url 'accounts_logout' %}">
          {% csrf_token %}
          <button type="submit" class="btn btn-outline-secondary">
            <i class="bi bi-box-arrow-right me-1"></i> Выйти
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
