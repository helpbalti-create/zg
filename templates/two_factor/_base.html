<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Здоровый Город{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a3a5c 0%, #2d6196 100%); min-height: 100vh; display: flex; align-items: center; }
        .auth-card { max-width: 460px; width: 100%; margin: 0 auto; border-radius: 16px; }
        .auth-logo { background: rgba(26,58,92,0.08); border-radius: 50%; width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .social-btn { border: 1.5px solid #dee2e6; border-radius: 8px; padding: 9px 14px; font-size:.9rem; transition: background .15s; }
        .social-btn:hover { background: #f8f9fa; }
        .divider { display: flex; align-items: center; gap: 10px; color: #adb5bd; margin: 18px 0; }
        .divider::before, .divider::after { content:''; flex: 1; border-top: 1px solid #dee2e6; }
        .security-badge { background: #e8f4fd; border-radius: 8px; font-size:.78rem; color: #0d6efd; }
        .form-control { border-radius: 8px; }
        .btn-primary-dark { background: #1a3a5c; border-color: #1a3a5c; border-radius: 8px; }
        .btn-primary-dark:hover { background: #14304f; border-color: #14304f; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="auth-card card shadow-lg p-4">
        <div class="text-center mb-4">
            <div class="auth-logo">
                <i class="bi bi-heart-pulse-fill text-danger fs-2"></i>
            </div>
            <h4 class="fw-bold" style="color:#1a3a5c">Здоровый Город</h4>
            <p class="text-muted small mb-0">Система учёта НКО</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}warning{% endif %} py-2 small">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
