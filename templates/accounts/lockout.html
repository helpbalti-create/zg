<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ заблокирован</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg,#6c0d0d,#c0392b); min-height:100vh; display:flex; align-items:center; }
    </style>
</head>
<body>
<div class="container">
    <div class="card shadow-lg p-5 text-center mx-auto" style="max-width:480px; border-radius:16px;">
        <i class="bi bi-shield-x text-danger" style="font-size:4rem"></i>
        <h3 class="mt-3 fw-bold">Доступ временно заблокирован</h3>
        <p class="text-muted mt-2">
            Обнаружено слишком много неудачных попыток входа с вашего IP-адреса.<br>
            Повторите попытку через <strong>30 минут</strong>.
        </p>
        <div class="alert alert-warning mt-3 text-start small">
            <i class="bi bi-info-circle me-2"></i>
            Если это были не вы — ваш аккаунт в безопасности. 
            Обратитесь к администратору для досрочной разблокировки.
        </div>
        <hr>
        <p class="text-muted small mb-0">
            <i class="bi bi-shield-check me-1"></i>
            Защита от брутфорса — <strong>django-axes</strong>
        </p>
    </div>
</div>
</body>
</html>
